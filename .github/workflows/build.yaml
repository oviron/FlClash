name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            flavor: classic
          - platform: android
            os: ubuntu-latest
            flavor: bydpi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android Signing
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          build-scan-publish: false
          gradle-home-cache-cleanup: true

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/28.0.13004108
          key: ndk-28.0.13004108-${{ runner.os }}

      - name: Setup ccache for NDK compilation
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ runner.os }}-${{ matrix.flavor }}
          max-size: 300M
          variant: ccache

      - name: Export NDK_CCACHE
        run: |
          CCACHE_BIN=$(which ccache)
          echo "NDK_CCACHE=$CCACHE_BIN" >> "$GITHUB_ENV"
          echo "ccache binary: $CCACHE_BIN"
          ccache --version | head -1

      - name: Cache CMake builds
        uses: actions/cache@v4
        with:
          path: |
            android/byedpi/.cxx
            android/core/.cxx
          key: cmake-${{ runner.os }}-${{ matrix.flavor }}-${{ hashFiles('android/byedpi/src/main/cpp/CMakeLists.txt', 'android/byedpi/src/main/cpp/byedpi/**/*.c', 'android/byedpi/src/main/cpp/byedpi/**/*.h', 'android/byedpi/src/main/cpp/native-lib.c', 'android/byedpi/src/main/cpp/main.h', 'android/core/src/main/cpp/CMakeLists.txt', 'android/core/src/main/cpp/*.cpp', 'android/core/src/main/cpp/*.h') }}
          restore-keys: |
            cmake-${{ runner.os }}-${{ matrix.flavor }}-
            cmake-${{ runner.os }}-

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} --flavor ${{ matrix.flavor }} ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Verify 16-KB page-size alignment for native libs
        if: startsWith(matrix.platform,'android')
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)
          ZIPALIGN="${BUILD_TOOLS}zipalign"
          echo "Using $ZIPALIGN"
          shopt -s nullglob
          apks=(./dist/*.apk)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No APK in ./dist, nothing to verify"
            exit 0
          fi
          for apk in "${apks[@]}"; do
            echo "Checking $apk for 16-KB .so alignment (Android 15+)"
            "$ZIPALIGN" -P 16 -c -v 4 "$apk" 2>&1 | grep -E "\.so .* (BAD|OK)" || true
            "$ZIPALIGN" -P 16 -c 4 "$apk" || { echo "FAILED: native .so libs in $apk are not 16-KB aligned"; exit 1; }
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}-${{ matrix.flavor }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine prerelease flag
        id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_SHA=$(git rev-parse "$TAG^{commit}")
          IS_ON_MAIN=false
          if git merge-base --is-ancestor "$TAG_SHA" origin/main 2>/dev/null; then
            IS_ON_MAIN=true
          fi
          HAS_HYPHEN=false
          [[ "$TAG" == *"-"* ]] && HAS_HYPHEN=true
          if $IS_ON_MAIN && ! $HAS_HYPHEN; then
            PRERELEASE=false
          else
            PRERELEASE=true
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG, on-main=$IS_ON_MAIN, has-hyphen=$HAS_HYPHEN, prerelease=$PRERELEASE"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifact-*

      - name: Collect APKs
        run: |
          mkdir -p release-apks
          find artifacts -name '*.apk' -exec cp {} release-apks/ \;
          ls -la release-apks/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.detect.outputs.tag }}
          name: ${{ steps.detect.outputs.tag }}
          prerelease: ${{ steps.detect.outputs.prerelease }}
          generate_release_notes: true
          files: release-apks/*.apk
          fail_on_unmatched_files: true
